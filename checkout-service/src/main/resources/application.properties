spring.application.name=checkout-service
server.port=8083

# Database (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/checkout_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:checkout_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:checkout_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# NATS
nats.url=${NATS_URL:nats://localhost:4222}
nats.subject.cart.get=v1.cart.get
nats.subject.product.get=v1.catalog.product.get
nats.subject.checkout.process=v1.checkout.process
nats.subject.checkout.confirm=v1.checkout.confirm

# Payment Provider (mocked)
payment-provider.base-url=${PAYMENT_PROVIDER_URL:https://mocked-payment.example.com}
payment-provider.timeout-ms=2000