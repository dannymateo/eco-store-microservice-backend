services:
  nats:
    image: nats:latest
    container_name: eco-store-nats
    ports:
      - "4222:4222"

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: eco-store-product-service
    environment:
      NATS_URL: nats://nats:4222
      SERVER_PORT: 8081
    depends_on:
      - nats
    ports:
      - "8081:8081"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: eco-store-api-gateway
    environment:
      NATS_URL: nats://nats:4222
      SERVER_PORT: 8080
    depends_on:
      - nats
      - product-service
    ports:
      - "8080:8080"
